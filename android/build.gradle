// dev.flutter.flutter-gradle-plugin мқҖ settings.gradleмқҳ
// includeBuild() лЎң мқҙлҜё classpathм—җ л“ұлЎқлҗҳлҜҖлЎң м—¬кё°м„ң м„ м–ё л¶Ҳн•„мҡ”

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
