name: camera_fps_inspector
description: A Flutter app to inspect the FPS range supported by device cameras.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+1
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  sizer: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
